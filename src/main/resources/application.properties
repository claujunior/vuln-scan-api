spring.datasource.url=jdbc:postgresql://localhost:5432/meu_banco
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

api.security.token.secret=${JWT_SECRET}
openrouter.api.key=${chaveApi}

# Monitoramento continuo: intervalo (ms) em que o scheduler verifica se ha
# auditorias pendentes. O intervalo de cada auditoria em si e configurado
# por alvo (campo intervaloMinutos de Monitoramento).
monitoramento.scheduler.fixedDelay=60000

# URL de webhook (Slack/Discord compativel, payload {"text": "..."}) usada
# pelo canal de notificacao "webhook". Opcional - se vazio, o canal so
# registra no log do servidor.
monitoramento.webhook.url=${WEBHOOK_URL:}